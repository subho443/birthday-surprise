<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

</head>

<body>

<canvas id="bg"></canvas>

<!-- ENTRY SCREEN -->
<div id="gate">
  <h1>💖 Who loves you the most?</h1>

  <button id="yesBtn">YOU ❤️</button>
  <button id="noBtn">ME 😂</button>

  <div id="correctMessage">
    <h2>Correct ❤️</h2>
    <div id="gift">🎁 Click Me</div>
  </div>
</div>

<!-- MAIN SCREEN -->
<div id="overlay">
  <h1>Happy Birthday ❤️</h1>
  <h2 id="typewriter"></h2>

  <button id="letterBtn">Open Letter 💌</button>
</div>

<!-- LETTER -->
<div id="letter">
  <div class="letterBox">
    <span id="closeLetter">❌</span>

    <h2>My Love ❤️</h2>
    <p>
      Happy Birthday 🎉  
      You are special to me ❤️
    </p>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music/song.mp3" type="audio/mp3">
</audio>

<button id="musicBtn">🎵 Play Music</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="script.js"></script>

</body>

</html>
